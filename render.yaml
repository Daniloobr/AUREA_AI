services:
  - type: web
    name: AUREA_AI
    env: python
    buildCommand: pip install -r requirements.txt
    # ⚠️ COMANDO PRINCIPAL: Roda apenas o Gunicorn.
    # Tasks Celery executam em modo EAGER (inline) por padrão.
    # Para ativar async real com Redis + worker, setar CELERY_ENABLED=true.
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
