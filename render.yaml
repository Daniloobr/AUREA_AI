services:
  - type: web
    name: AUREA_AI
    env: python
    buildCommand: pip install -r requirements.txt
    # ⚠️ COMANDO PRINCIPAL: Roda o Gunicorn e o Celery Worker no mesmo container
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2 & celery -A celery_app.celery worker --loglevel=info --concurrency=1 & wait
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
